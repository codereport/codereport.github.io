<div class="social-icons">
  {% if site.footer-links.youtube %}<a href="{{ site.footer-links.youtube }}" target="_blank" rel="noopener" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>{% endif %}
  {% if site.footer-links.github %}<a href="{{ site.footer-links.github }}" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>{% endif %}
  {% if site.footer-links.linkedin %}<a href="{{ site.footer-links.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>{% endif %}
  {% if site.footer-links.twitter %}<a href="{{ site.footer-links.twitter }}" target="_blank" rel="noopener" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>{% endif %}
  {% if site.footer-links.mastodon %}<a href="{{ site.footer-links.mastodon }}" target="_blank" rel="me noopener" aria-label="Mastodon"><i class="fa-brands fa-mastodon"></i></a>{% endif %}
  {% if site.footer-links.bluesky %}<a href="{{ site.footer-links.bluesky }}" target="_blank" rel="noopener" aria-label="Bluesky"><i class="fa-brands fa-bluesky"></i></a>{% endif %}
</div>
